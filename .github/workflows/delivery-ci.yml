name: Delivery CI

on:
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      AFFECTED_BASE:
        description: Value for --base= in nx affected commands
        required: false

jobs:
  build:
    permissions:
      id-token: write # Required for OIDC to NPM for publishing
      contents: write # Required for release tagging
      packages: write # Required for GitHub packages (nuget and maven for SDKs)
    runs-on: ubuntu-22.04
    outputs:
      affected_apps: ${{ steps.set_outputs.outputs.affected_apps }}
      affected_apps_array: ${{ steps.set_outputs.outputs.affected_apps_array }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          # cache disabled temporarily to bypass corrupted cache causing npm ci hangs
          # cache: "npm"
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: snok/install-poetry@v1
        with:
          version: "1.6.1"
      - run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm ci --prefer-offline --loglevel verbose
        timeout-minutes: 15
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      - name: Get last successful commit
        id: last_successful_commit
        uses: nrwl/nx-set-shas@v5
      - name: Build
        id: production-build
        uses: ./.github/actions/nx-production-build
        with:
          affected-base: ${{ github.event.inputs.AFFECTED_BASE || steps.last_successful_commit.outputs.base }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm prune --production
      - if: steps.production-build.outputs.affected-apps
        run: tar czf adsp-build-dist.tar.gz node_modules/ dist/
      - if: steps.production-build.outputs.affected-apps
        uses: actions/upload-artifact@v6
        with:
          name: build-dist
          path: adsp-build-dist.tar.gz
      # Set build job outputs for subsequent jobs.
      - id: set_outputs
        run: |
          echo "affected_apps=${{ steps.production-build.outputs.affected-apps }}" >> $GITHUB_OUTPUT
          echo "affected_apps_array=$(echo ${{ steps.production-build.outputs.affected-apps }} | sed -e "s/ /\",\"/g" -e "s/^/[\"/" -e "s/$/\"]/")" >> $GITHUB_OUTPUT

  buildContainers:
    permissions:
      packages: write # Required for GitHub container registry
    runs-on: ubuntu-24.04
    needs: build
    if: needs.build.outputs.affected_apps
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: build-dist
          path: ./
      - run: tar -xf adsp-build-dist.tar.gz
      - name: Build container
        uses: ./.github/actions/build-publish-container
        with:
          app: ${{ matrix.app }}
          redhat-io-username: ${{ secrets.REGISTRY_REDHAT_IO_USER }}
          redhat-io-password: ${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}
          build-context: "./"
          container-file: ${{ hashFiles(format('./apps/{0}/Dockerfile', matrix.app)) && format('./apps/{0}/Dockerfile', matrix.app) || hashFiles(format('./dist/apps/{0}/index.html', matrix.app)) && './.openshift/app/Dockerfile' || './.openshift/service/Dockerfile' }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  deployDev:
    runs-on: ubuntu-22.04
    needs: [build, buildContainers]
    strategy:
      fail-fast: true
      max-parallel: 4
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    environment:
      name: Dev
    steps:
      - uses: actions/checkout@v5
      - name: Oc login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.ARO_SERVER }}
          openshift_token: ${{ secrets.ARO_TOKEN }}
          namespace: adsp-build
          insecure_skip_tls_verify: true
      - name: Deploy to dev
        uses: ./.github/actions/deploy-app
        with:
          app: ${{ matrix.app }}
          from: latest
          to: dev

  devSmokeTest:
    runs-on: ubuntu-22.04
    needs: [build, deployDev]
    environment:
      name: Dev-e2e
    strategy:
      matrix:
        app: [tenant-management-webapp, status-app, subscriber-app]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
      - name: E2E Test
        uses: ./.github/actions/nx-cypress-e2e
        with:
          app: ${{ matrix.app }}
          environment: dev
          tags: "@smoke-test and not @ignore"
          core-api-client-secret: ${{ secrets.CY_CORE_API_CLIENT_SECRET }}
          core-api-user-password: ${{ secrets.CY_CORE_API_USER_PASSWORD }}
          api-client-secret: ${{ secrets.CY_CLIENT_SECRET }}
          cy-password: ${{ secrets.CY_PASSWORD }}
          cy-password-2: ${{ secrets.CY_PASSWORD2 }}
          cy-password-3: ${{ secrets.CY_PASSWORD3 }}

  deployStagingApproval:
    runs-on: ubuntu-22.04
    needs: [build, devSmokeTest]
    environment:
      name: Staging-gate
    steps:
      - run: echo "Staging deployment approved"

  deployStaging:
    runs-on: ubuntu-22.04
    needs: [build, deployStagingApproval]
    strategy:
      fail-fast: true
      max-parallel: 4
      matrix:
        app: ${{ fromJson(needs.build.outputs.affected_apps_array) }}
    environment:
      name: Staging
    steps:
      - uses: actions/checkout@v5
      - name: Oc login
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.ARO_SERVER }}
          openshift_token: ${{ secrets.ARO_TOKEN }}
          namespace: adsp-build
          insecure_skip_tls_verify: true
      - name: Deploy to uat
        uses: ./.github/actions/deploy-app
        with:
          app: ${{ matrix.app }}
          from: dev
          to: uat

  stagingSmokeTest:
    runs-on: ubuntu-22.04
    needs: [build, deployStaging]
    environment:
      name: Staging-e2e
    strategy:
      matrix:
        app: [tenant-management-webapp, status-app, subscriber-app]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
      - name: E2E Test
        uses: ./.github/actions/nx-cypress-e2e
        with:
          app: ${{ matrix.app }}
          environment: staging
          tags: "@smoke-test and not @ignore"
          core-api-client-secret: ${{ secrets.CY_CORE_API_CLIENT_SECRET }}
          core-api-user-password: ${{ secrets.CY_CORE_API_USER_PASSWORD }}
          api-client-secret: ${{ secrets.CY_CLIENT_SECRET }}
          cy-password: ${{ secrets.CY_PASSWORD }}
          cy-password-2: ${{ secrets.CY_PASSWORD2 }}
          cy-password-3: ${{ secrets.CY_PASSWORD3 }}

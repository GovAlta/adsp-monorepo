name: Pull Request Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          # cache disabled temporarily to bypass corrupted cache causing npm ci hangs
          # cache: "npm"
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: snok/install-poetry@v1
        with:
          version: "1.6.1"
      - run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm ci --prefer-offline --loglevel verbose
        timeout-minutes: 15
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      # Run with the target branch as the base.
      - name: Build
        uses: ./.github/actions/nx-production-build
        with:
          affected-base: origin/${{ github.base_ref }}

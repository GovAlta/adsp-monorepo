        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic not found.

/comment/v1/topics/{topicId}/comments:
  get:
    tags:
      - Topic
    description: Retrieves topic comments.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
      - name: top
        description: Number of topics to return.
        in: query
        required: false
        schema:
          type: integer
      - name: after
        description: Cursor for the page to retrieve.  Use the _page.next_ value returned in the previous call to page sequentially through the data.
        in: query
        required: false
        schema:
          type: string
      - name: criteria
        description: Criteria for comments to retrieve.
        in: query
        required: false
        schema:
          type: object
          properties:
            titleLike:
              type: string
            contentLike:
              type: string
            titleOrContentLike:
              type: string
            idGreaterThan:
              type: number
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: "#/components/schemas/Comment"
                page:
                  type: object
                  properties:
                    after:
                      type: string
                      description: cursor representing the set of data returned.
                      example: Mw==
                    next:
                      type: string
                      description: cursor representing the next set of data to be returned.
                      example: Ng==
                    size:
                      description: The number of comments returned by the query.
                      example: 10
                      type: integer
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic not found.
  post:
    tags:
      - Topic
    description: Creates a topic comment.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Title of the comment.
              content:
                type: string
                description: Content of the comment.
              context:
                type: object
                description: Optional arbitrary JSON context data associated with the comment.
                additionalProperties: true
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Comment"
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic not found.

/comment/v1/topics/{topicId}/comments/{commentId}:
  get:
    tags:
      - Topic
    description: Retrieves a topic comment.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
      - name: commentId
        description: ID of the comment.
        in: path
        required: true
        schema:
          type: integer
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Comment"
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic or comment not found.
  patch:
    tags:
      - Topic
    description: Updates a topic comment.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
      - name: commentId
        description: ID of the comment.
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Title of the comment.
              content:
                type: string
                description: Content of the comment.
              context:
                type: object
                description: Optional arbitrary JSON context data. When supplied, it replaces the existing context.
                additionalProperties: true
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Comment"
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic or comment not found.
  delete:
    tags:
      - Topic
    description: Deletes a topic and associated comments.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
      - name: commentId
        description: ID of the comment.
        in: path
        required: true
        schema:
          type: integer

    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                deleted:
                  type: boolean
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic or comment not found.

components:
  schemas:
    TopicType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        adminRoles:
          type: array
          items:
            type: string
        readerRoles:
          type: array
          items:
            type: string
        commenterRoles:
          type: array
          items:
            type: string
        securityClassification:
          type: string
    Topic:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/TopicType"
        id:
          type: integer
        urn:
          type: string
        resourceId:
          type: string
        name:
          type: string
        description:
          type: string
        commenters:
          type: array
          items:
            type: string
        securityClassification:
          type: string
          enum:
            - public
            - protected a
            - protected b
            - protected c
        requiresAttention:
          type: boolean

    Comment:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        context:
          type: object
          description: Arbitrary JSON context data associated with the comment.
          additionalProperties: true
        createdBy:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        createdOn:
          type: string
          format: date-time
        lastUpdatedBy:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        lastUpdatedOn:
          type: string
          format: date-time

/comment/v1/topic-types:
  get:
    tags:
      - Topic
    description: Retrieves all topic types for the tenant.
    responses:
      200:
        description: Topic types retrieved successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TopicType"
      401:
        description: Not authenticated.
      403:
        description: User not permitted for requested operation.
  post:
    tags:
      - Topic
    description: Creates a new topic type for the tenant.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: string
                description: ID of the topic type.
                example: case
              name:
                type: string
                description: Name of the topic type.
                example: Case
              readRoles:
                type: array
                description: Optional roles allowed to read topics of this type.
                items:
                  type: string
              writeRoles:
                type: array
                description: Optional roles allowed to write comments on topics of this type.
                items:
                  type: string
            required: [id, name]
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
      401:
        description: Not authenticated.
      403:
        description: User not permitted for requested operation.
      409:
        description: Topic type name already exists.

/comment/v1/topic-types/{topic-type-id}:
  get:
    tags:
      - Topic
    description: Retrieves a specific topic type for the tenant.
    parameters:
      - name: topic-type-id
        description: ID of the topic type to retrieve.
        in: path
        required: true
        schema:
          type: string
    responses:
      200:
        description: Topic type retrieved successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicType"
      401:
        description: Not authenticated.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic type not found.
  patch:
    tags:
      - Topic
    description: Updates a topic type for the tenant.
    parameters:
      - name: topic-type-id
        description: ID of the topic type to update.
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Name of the topic type.
                example: Case
              readRoles:
                type: array
                description: Optional roles allowed to read topics of this type.
                items:
                  type: string
              writeRoles:
                type: array
                description: Optional roles allowed to write comments on topics of this type.
                items:
                  type: string
    responses:
      200:
        description: Topic type updated successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicType"
      401:
        description: Not authenticated.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic type not found.
  delete:
    tags:
      - Topic
    description: Permanently deletes a topic type for the tenant.
    parameters:
      - name: topic-type-id
        description: ID of the topic type to delete.
        in: path
        required: true
        schema:
          type: string
    responses:
      200:
        description: Topic type deleted successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                deleted:
                  type: boolean
                id:
                  type: string
      401:
        description: Not authenticated.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic type not found.
      409:
        description: Topic type has associated topics that must be deleted first.
        content:
          application/json:
            schema:
              type: object
              properties:
                errorMessage:
                  type: string
                topics:
                  type: integer

/comment/v1/topics:
  get:
    tags:
      - Topic
    description: Retrieves topics.
    parameters:
      - name: top
        description: Number of topics to return.
        in: query
        required: false
        schema:
          type: integer
      - name: after
        description: Cursor for the page to retrieve.  Use the _page.next_ value returned in the previous call to page sequentially through the data.
        in: query
        required: false
        schema:
          type: string
      - name: criteria
        description: Criteria for topics to retrieve.
        in: query
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                typeIdEquals:
                  type: string
                resourceIdEquals:
                  type: string
                requiresAttention:
                  type: boolean
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: "#/components/schemas/Topic"
                page:
                  type: object
                  properties:
                    after:
                      type: string
                      description: cursor representing the set of data returned.
                      example: Mw==
                    next:
                      type: string
                      description: cursor representing the next set of data to be returned.
                      example: Ng==
                    size:
                      description: The number of topics returned by the query.
                      example: 10
                      type: integer
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
  post:
    tags:
      - Topic
    description: Creates a new topic.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              typeId:
                type: string
                description: ID of the topic type associated with the topic to create.
              name:
                type: string
                description: The name of the topic.
                example: Case ABC-12
              description:
                type: string
                description: A description of the topic.
                example: Comments on the case.
              securityClassification:
                description: The security classification type of the topic.
                type: string
                default: protected a
                enum:
                  - public
                  - protected a
                  - protected b
                  - protected c

              commenters:
                type: array
                items:
                  type: string
                description: Array containing IDs of additional users allowed to comment on the topic.
              resourceId:
                type: string
                description: URN of the ADSP resource associated with the topic.
                example: urn:ads:support:case:v1:/cases/abc-123
            required: [name, typeId]
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Topic"
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic type not found.

/comment/v1/topics/{topicId}:
  get:
    tags:
      - Topic
    description: Retrieves a topic.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Topic"
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic not found.
  patch:
    tags:
      - Topic
    description: Updates a topic.
    parameters:
      - name: topicId
        description: ID of the topic.
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: The name of the topic.
                example: Case ABC-12
              description:
                type: string
                description: A description of the topic.
                example: Comments on the case.
              commenters:
                type: array
                items:
                  type: string
                description: Array containing IDs of additional users allowed to comment on the topic.
    responses:
      200:
        description: Request completed successfully.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Topic"
      401:
        description: Not authorized.
      403:
        description: User not permitted for requested operation.
      404:
        description: Topic not found.
  delete:

components:
  schemas:
    FormDefinition:
      type: object
      required:
        - name
        - anonymousApply
        - applicantRoles
        - assessorRoles
      properties:
        id:
          type: string
          readOnly: true
          description: Unique identifier for the form definition. Always auto-generated from the name in kebab-case format. Cannot be set by the client.
        name:
          type: string
        description:
          type: string
        anonymousApply:
          type: boolean
          default: false
          description: Whether anonymous (unauthenticated) applicants can submit the form. Defaults to false.
        oneFormPerApplicant:
          type: boolean
        applicantRoles:
          type: array
          description: Roles allowed to submit the form.
          items:
            type: string
        assessorRoles:
          type: array
          description: Roles allowed to assess submitted forms.
          items:
            type: string
        clerkRoles:
          type: array
          items:
            type: string
        formDraftUrlTemplate:
          type: string
          minLength: 6
          maxLength: 500
          pattern: '^https?://.+$'
          description: Optional URL template for linking applicants back to their draft. Use '{{id}}' as a placeholder for the form ID (e.g. https://example.com/form/{{id}}). Must be between 6 and 500 characters.
        dataSchema:
          type: object
        uiSchema:
          type: object
        dispositionStates:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
        submissionRecords:
          type: boolean
        submissionPdfTemplate:
          type: string
        scheduledIntakes:
          type: boolean
        supportTopic:
          type: boolean
        securityClassification:
          type: string
          enum: [public, 'protected a', 'protected b', 'protected c']
        queueTaskToProcess:
          type: object
          properties:
            queueNameSpace:
              type: string
            queueName:
              type: string
        customSubmissionEvent:
          type: object
          properties:
            namespace:
              type: string
            name:
              type: string
        dryRun:
          type: boolean
    FormDefinitionCreate:
      type: object
      description: Payload for creating a new form definition. Only name and description are accepted; all other fields are set to defaults.
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
      additionalProperties: false
    FormDefinitionPatch:
      type: object
      description: Partial update payload for a form definition. Only provided fields will be updated; omitted fields will not be changed.
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        dataSchema:
          type: object
        uiSchema:
          type: object
      additionalProperties: false
    Form:
      type: object
      properties:
        urn:
          type: string
        id:
          type: string
        jobId:
          type: string
        definition:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        anonymousApplicant:
          type: boolean
        applicant:
          type: object
          properties:
            addressAs:
              type: string
        status:
          type: string
          enum: [draft, locked, submitted, archived]
        created:
          type: string
          format: date-time
        createdBy:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
          required: [id, name]
        lastAccessed:
          type: string
          format: date-time
        locked:
          type: string
          format: date-time
        submitted:
          type: string
          format: date-time
        submission:
          type: object
          description: submission for the form if form is submitted.
          properties:
            id:
              type: string
            urn:
              type: string
    FormData:
      type: object
      properties:
        data:
          type: object
        files:
          type: object
          additionalProperties:
            type: string
            format: uri
    FormSubmissionCriteria:
      type: object
      properties:
        createDateBefore:
          type: string
          format: date-time
        createDateAfter:
          type: string
          format: date-time
        dispositioned:
          type: boolean
        dispositionStatusEquals:
          type: string
        dispositionDateBefore:
          type: string
          format: date-time
        dispositionDateAfter:
          type: string
          format: date-time
        createdByIdEquals:
          type: string
    FormDisposition:
      type: object
      properties:
        status:
          type: string
        reason:
          type: string
        date:
          type: string
          format: date-time
    FormSubmission:
      type: object
      properties:
        urn:
          type: string
        id:
          type: string
        definitionId:
          type: string
        tenantId:
          type: string
        formId:
          type: string
        formData:
          type: object
        formFiles:
          type: object
        created:
          type: string
          format: date-time
        createdBy:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        updatedBy:
          type: string
        updated:
          type: string
          format: date-time
        disposition:
          $ref: '#/components/schemas/FormDisposition'
    SendCodeOperation:
      type: object
      properties:
        operation:
          type: string
          enum: [send-code]
    UnlockFormOperation:
      type: object
      properties:
        operation:
          type: string
          enum: [unlock]
    SubmitFormOperation:
      type: object
      properties:
        operation:
          type: string
          enum: [submit]
    ArchiveFormOperation:
      type: object
      properties:
        operation:
          type: string
          enum: [archive]
    SetToDraftOperation:
      type: object
      properties:
        operation:
          type: string
          enum: [to-draft]

/form/v1/definitions:
  get:
    tags:
      - Form
    description: Retrieves form definitions with optional name search.
    parameters:
      - name: top
        description: Number of definitions to return in a page.
        in: query
        required: false
        schema:
          type: number
      - name: after
        description: Cursor for retrieving additional pages.
        in: query
        required: false
        schema:
          type: string
      - name: name
        description: Search for form definitions by name (partial match, case-insensitive).
        in: query
        required: false
        schema:
          type: string
    responses:
      200:
        description: Successfully retrieved form definitions.
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: '#/components/schemas/FormDefinition'
                page:
                  type: object
                  properties:
                    after:
                      type: string
                    next:
                      type: string
                    size:
                      type: number
  post:
    tags:
      - Form
    description: |
      Creates a new form definition. Requires the form-service admin role.

      Only `name` and `description` are accepted in the request body. All other fields are set automatically:
      - `id`: auto-generated from `name` in kebab-case
      - `anonymousApply`: `false`
      - `applicantRoles`: `[]`
      - `assessorRoles`: `[]`
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FormDefinitionCreate'
          example:
            name: My Application Form
    responses:
      201:
        description: Successfully created the form definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormDefinition'
      400:
        description: Validation failed or ID could not be generated from the provided name.
      401:
        description: User is not authorized to create form definitions.
      409:
        description: Form definition with the generated ID already exists.

/form/v1/definitions/{definitionId}:
  get:
    tags:
      - Form
    description: Retrieves a form definition.
    parameters:
      - name: definitionId
        description: ID of the form definition.
        required: true
        in: path
        schema:
          type: string
      - name: version
        description: Number of forms to return in a page.
        in: query
        required: false
        schema:
          type: number
    responses:
      200:
        description: Successfully retrieved a form definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormDefinition'
  patch:
    tags:
      - Form
    description: Partially updates an existing form definition. Requires the form-service admin role. Only the provided fields are changed; omitted fields are left unchanged.
    parameters:
      - name: definitionId
        description: ID of the form definition to patch.
        required: true
        in: path
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FormDefinitionPatch'
    responses:
      200:
        description: Successfully patched the form definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormDefinition'
      401:
        description: User is not authorized to patch form definitions.
      404:
        description: Form definition not found.
  put:
    tags:
      - Form
    description: Updates an existing form definition. Requires the form-service admin role.
    parameters:
      - name: definitionId
        description: ID of the form definition to update.
        required: true
        in: path
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FormDefinition'
    responses:
      200:
        description: Successfully updated the form definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormDefinition'
      401:
        description: User is not authorized to update form definitions.
      404:
        description: Form definition not found.
  delete:
    tags:
      - Form
    description: Deletes a form definition. Requires the form-service admin role.
    parameters:
      - name: definitionId
        description: ID of the form definition to delete.
        required: true
        in: path
        schema:
          type: string
    responses:
      204:
        description: Successfully deleted the form definition.
      401:
        description: User is not authorized to delete form definitions.
      404:
        description: Form definition not found.

/form/v1/forms:
  get:
    tags:
      - Form
    description: Find forms.
    parameters:
      - name: top
        description: Number of forms to return in a page.
        in: query
        required: false
        schema:
          type: number
      - name: after
        description: Cursor for retrieving additional pages.
        in: query
        required: false
        schema:
          type: string
      - name: includeData
        description: Flag indicating if data should be included in results.
        in: query
        required: false
        schema:
          type: boolean
      - name: criteria
        description: Criteria for the forms to retrieve.
        in: query
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                anonymousApplicantEquals:
                  type: boolean
                definitionIdEquals:
                  type: string
                statusEquals:
                  type: string
                  enum: [draft, locked, submitted, archived]
                lastAccessedBefore:
                  type: string
                  format: date-time
                lockedBefore:
                  type: string
                  format: date-time
                createdByIdEquals:
                  type: string
                hashEquals:
                  type: string
    responses:
      200:
        description: Successfully created a form.
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: '#/components/schemas/Form'
                page:
                  type: object
                  properties:
                    after:
                      type: string
                    next:
                      type: string
                    size:
                      type: number
  post:
    tags:
      - Form
    description: Creates a draft form.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              definitionId:
                type: string
              applicant:
                type: object
                properties:
                  userId:
                    type: string
                  addressAs:
                    type: string
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        channel:
                          type: string
                          enum: [email, sms]
                        address:
                          type: string
                      required: [channel, address]
              data:
                type: object
              files:
                type: object
                additionalProperties:
                  type: string
                  format: uri
              submit:
                type: boolean
            required: [definitionId]
    responses:
      200:
        description: Successfully created a form.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Form'

/form/v1/forms/{formId}:
  parameters:
    - name: formId
      description: ID of the form.
      required: true
      in: path
      schema:
        type: string
  get:
    tags:
      - Form
    description: Retrieves a form.
    parameters:
      - name: includeData
        description: Flag indicating if data should be included in results.
        in: query
        required: false
        schema:
          type: boolean
    responses:
      200:
        description: Successfully retrieved the form.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Form'
  post:
    tags:
      - Form
    description: Executes a form operation.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/UnlockFormOperation'
              - $ref: '#/components/schemas/SubmitFormOperation'
              - $ref: '#/components/schemas/ArchiveFormOperation'
              - $ref: '#/components/schemas/SendCodeOperation'
              - $ref: '#/components/schemas/SetToDraftOperation'
            discriminator:
              propertyName: operation
              mapping:
                unlock: '#/components/schemas/UnlockFormOperation'
                submit: '#/components/schemas/SubmitFormOperation'
                archive: '#/components/schemas/ArchiveFormOperation'
                send-code: '#/components/schemas/SendCodeOperation'
                to-draft: '#/components/schemas/SetToDraftOperation'
    responses:
      200:
        description: Successfully executed operation.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Form'
  delete:
    tags:
      - Form
    description: Deletes a form.
    responses:
      200:
        description: Successfully deleted the form.
        content:
          application/json:
            schema:
              type: object
              properties:
                deleted:
                  type: boolean

/form/v1/forms/{formId}/data:
  parameters:
    - name: formId
      description: ID of the form.
      required: true
      in: path
      schema:
        type: string
  get:
    tags:
      - Form
    description: Retrieves form data.
    parameters:
      - name: code
        description: Verify code for accessing the form data.
        required: false
        in: query
        schema:
          type: string
    responses:
      200:
        description: Successfully retrieved the form.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormData'
  put:
    tags:
      - Form
    description: Sets the form data.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                description: Form data. File references can be embedded directly as file-service URNs anywhere in this object.
            required: [data]
    responses:
      200:
        description: Successfully updated the form.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormData'

/form/v1/forms/{formId}/submissions/{submissionId}:
  parameters:
    - name: formId
      description: ID of the form.
      required: true
      in: path
      schema:
        type: string
    - name: submissionId
      description: ID of the submission.
      required: true
      in: path
      schema:
        type: string
  get:
    tags:
      - Form Submission
    description: Retrieves a form submission.
    responses:
      200:
        description: Successfully retrieved the form submission.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmission'
  post:
    tags:
      - Form Submission
    description: Update the form disposition for the form submission.
    responses:
      200:
        description: Successfully updated the form submission.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmission'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              dispositionStatus:
                type: string
              dispositionReason:
                type: string

/form/v1/forms/{formId}/submissions:
  parameters:
    - name: formId
      description: ID of the form.
      required: true
      in: path
      schema:
        type: string
  get:
    tags:
      - Form Submission
    description: |
      Retrieves submissions of a specified form matching search criteria.
    parameters:
      - name: formId
        description: ID of the form.
        in: path
        required: true
        schema:
          type: string
      - name: top
        description: Number of submissions to return in a page.
        in: query
        required: false
        schema:
          type: number
      - name: after
        description: Cursor for retrieving additional pages.
        in: query
        required: false
        schema:
          type: string
      - name: criteria
        description: Criteria for form submissions to retrieve.
        in: query
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                createDateBefore:
                  description: The form submission create date that it was created before.
                  type: string
                  format: date-time
                createDateAfter:
                  description: The form submission create date that it was created after.
                  type: string
                  format: date-time
                dispositionStatusEquals:
                  description: The disposition status for the form submission.
                  type: string
                dispositionDateBefore:
                  description: The disposition before date for the form submission was updated.
                  type: string
                  format: date-time
                dispositionDateAfter:
                  description: The disposition after date for the form submission was updated
                  type: string
                  format: date-time
                createdByIdEquals:
                  description: The id the form submission was created by.
                  type: string
    responses:
      200:
        description: Successfully retrieves the form submissions.
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: '#/components/schemas/FormSubmission'
                page:
                  type: object
                  properties:
                    after:
                      type: string
                    next:
                      type: string
                    size:
                      type: number

/form/v1/submissions:
  get:
    tags:
      - Form Submission
    description: |
      Retrieves submissions matching search criteria.
    parameters:
      - name: top
        description: Number of submissions to return in a page.
        in: query
        required: false
        schema:
          type: number
      - name: after
        description: Cursor for retrieving additional pages.
        in: query
        required: false
        schema:
          type: string
      - name: criteria
        description: Criteria for form submissions to retrieve.
        in: query
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                createDateBefore:
                  description: The form submission create date that it was created before.
                  type: string
                  format: date-time
                createDateAfter:
                  description: The form submission create date that it was created after.
                  type: string
                  format: date-time
                dispositionStatusEquals:
                  description: The disposition status for the form submission.
                  type: string
                dispositionDateBefore:
                  description: The disposition before date for the form submission was updated.
                  type: string
                  format: date-time
                dispositionDateAfter:
                  description: The disposition after date for the form submission was updated
                  type: string
                  format: date-time
                createdByIdEquals:
                  description: The id the form submission was created by.
                  type: string
    responses:
      200:
        description: Successfully retrieves the form submissions.
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: '#/components/schemas/FormSubmission'
                page:
                  type: object
                  properties:
                    after:
                      type: string
                    next:
                      type: string
                    size:
                      type: number
/form/v1/submissions/{submissionId}:
  parameters:
    - name: submissionId
      description: ID of the submission.
      required: true
      in: path
      schema:
        type: string
  get:
    tags:
      - Form Submission
    description: Retrieves a form submission.
    responses:
      200:
        description: Successfully retrieved the form submission.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmission'
  delete:
    tags:
      - Form Submission
    description: Deletes a form submission.
    responses:
      200:
        description: Successfully deleted the form submission.
        content:
          application/json:
            schema:
              type: object
              properties:
                deleted:
                  type: boolean
/form/v1/registers:
  get:
    tags:
      - Form
    description: Retrieves all data registers for the tenant.
    responses:
      201:
        description: Successfully retrieved data registers.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DataRegister'
      401:
        description: User is not authorized to retrieve data registers.
